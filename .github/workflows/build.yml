name: build

# CI gate: build all four Veyra binaries on Windows x64 (MSVC, VS 2022),
# run unit tests (dsp_tests + common_tests), and upload the portable artifact.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows x64 Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # spdlog (and future submodules)

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake --preset windows-release -DVEYRA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build --preset windows-release

      - name: Test (DSP)
        run: ctest --test-dir build/windows-release --output-on-failure

      - name: Verify all shipped binaries exist and stage them
        shell: pwsh
        run: |
          $root = "build/windows-release"
          $expected = @("veyra.exe", "veyra-service.exe", "veyra-apo.dll",
                        "veyra-overlay.exe", "VeyraSetupHelper.exe")
          New-Item -ItemType Directory -Force dist | Out-Null
          $missing = @()
          foreach ($f in $expected) {
            # JUCE may emit veyra.exe under a *_artefacts/ subfolder, so search recursively.
            $hit = Get-ChildItem -Path $root -Recurse -Filter $f -File -ErrorAction SilentlyContinue |
                   Select-Object -First 1
            if ($hit) { Copy-Item $hit.FullName dist/; Write-Host "Found $f -> $($hit.FullName)" }
            else { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing expected artifacts: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All shipped binaries present."

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: veyra-windows-x64
          path: dist/
          if-no-files-found: error

      - name: Package portable ZIP
        shell: pwsh
        run: |
          $ver = (Select-String -Path CMakeLists.txt -Pattern 'set\(VEYRA_VERSION\s+([\d.]+)' |
                  Select-Object -First 1).Matches[0].Groups[1].Value
          pwsh installer/portable/make-portable.ps1 -BinDir dist -RepoRoot . -OutDir dist-portable -Version $ver

      - name: Upload portable
        uses: actions/upload-artifact@v4
        with:
          name: veyra-portable-x64
          path: dist-portable/*.zip
          if-no-files-found: error
