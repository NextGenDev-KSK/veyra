name: build

# Phase 0 acceptance gate: prove the four no-op binaries build on a clean
# Windows runner (VS 2022 + Windows SDK) and upload them as artifacts.

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    name: Windows x64 Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive   # spdlog (and future submodules)

      - name: Set up MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Set up CMake + Ninja
        uses: lukka/get-cmake@latest

      - name: Configure
        run: cmake --preset windows-release -DVEYRA_BUILD_TESTS=ON

      - name: Build
        run: cmake --build --preset windows-release

      - name: Test (DSP)
        run: ctest --test-dir build/windows-release --output-on-failure

      - name: Verify all four binaries exist and stage them
        shell: pwsh
        run: |
          $root = "build/windows-release"
          $expected = @("veyra.exe", "veyra-service.exe", "veyra-apo.dll", "veyra-overlay.exe")
          New-Item -ItemType Directory -Force dist | Out-Null
          $missing = @()
          foreach ($f in $expected) {
            # JUCE may emit veyra.exe under a *_artefacts/ subfolder, so search recursively.
            $hit = Get-ChildItem -Path $root -Recurse -Filter $f -File -ErrorAction SilentlyContinue |
                   Select-Object -First 1
            if ($hit) { Copy-Item $hit.FullName dist/; Write-Host "Found $f -> $($hit.FullName)" }
            else { $missing += $f }
          }
          if ($missing.Count -gt 0) {
            Write-Error "Missing expected artifacts: $($missing -join ', ')"
            exit 1
          }
          Write-Host "All four binaries present."

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: veyra-windows-x64
          path: dist/
          if-no-files-found: error
