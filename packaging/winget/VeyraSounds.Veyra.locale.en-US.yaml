Description: >-
  Veyra Sounds is a free, open-source, system-wide audio enhancer for
  Windows 10/11. Realtime 10-band graphic and 16-band parametric EQ, spatial
  HRTF virtualisation, compressor, reverb, bass enhancement and a true peak
  limiter, plus a gamer Sound Tracker radar HUD, 27 built-in presets and 16
  AutoEQ headphone profiles. The Audio Bridge routes any app's sound through
  the DSP chain, and the Mic Bridge cleans your microphone with the RNNoise
  machine-learning denoiser.
